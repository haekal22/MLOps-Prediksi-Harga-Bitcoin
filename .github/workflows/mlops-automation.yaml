name: MLOps Automation Pipeline

on:
  push:
    branches:
      - main
      - feat/initial-setup
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Pull DVC Data
      run: |
        # Pastikan kredensial DVC remote sudah di-set di GitHub Secrets jika dibutuhkan
        dvc pull

    - name: Generate Dataset
      run: | 
        python src/preprocess.py

    - name: Run Unit Test
      run: |
        pytest tests/

  train:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        pip install --upgrade pip
        pip install setuptools==69.5.1 wheel
        pip install dvc

    - name: Pull DVC Data
      run: |
        dvc pull

    - name: Generate Dataset
      run: |
        python src/preprocess.py

    - name: Run Training
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }} # Masukkan URL MLflow kamu di GitHub Secrets
      run: |
        python src/train_best.py

  evaluate:
    needs: train
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Evaluate Model
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      run: |
        python src/evaluate.py

    # Simpan hasil kelulusan run_id agar bisa dipakai di job berikutnya
    - name: Upload Run ID Artifact
      uses: actions/upload-artifact@v4
      with:
        name: run-id-artifact
        path: latest_run_id.txt

  registry:
    needs: evaluate
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    # Download file text run_id yang lolos validasi tadi
    - name: Download Run ID Artifact
      uses: actions/download-artifact@v4
      with:
        name: run-id-artifact

    # Jalankan skrip registrasi murni (bukan malah training lagi!)
    - name: Run Registry Step
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      run: |
        python src/register.py