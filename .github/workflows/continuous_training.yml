name: Continuous Training (CT) Closed-Loop Pipeline

on:
  repository_dispatch:
    types: [ModelLatencyTooHigh, DataDriftValidationFailure]
  workflow_dispatch: 

jobs:
  continuous_training_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install setuptools==69.5.1 wheel
        pip install dvc
        pip install -r requirements.txt

    - name: Create Workspaces Directory for MLflow
      run: |
        sudo mkdir -p /workspaces/MLOps-Prediksi-Harga-Bitcoin
        sudo chmod -R 777 /workspaces

    - name: Pull Latest Data from DVC
      run: |
        dvc pull

    - name: Run Retraining (LK-06)
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      run: |
        python src/train_best.py

    - name: Run Auto-Evaluation (LK-07)
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      run: |
        python src/evaluate.py

    - name: Upload Run ID Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ct-run-id
        path: latest_run_id.txt

  auto_promote:
    needs: continuous_training_loop
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install setuptools==69.5.1 wheel
        pip install -r requirements.txt

    - name: Download Run ID Artifact
      uses: actions/download-artifact@v4
      with:
        name: ct-run-id

    - name: Promote to Registry
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      run: |
        python src/register.py